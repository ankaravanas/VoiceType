<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- VoiceType Logo: Microphone with Flowing Soundwave -->

  <!-- Background Circle -->
  <g id="background">
    <circle cx="256" cy="256" r="240" fill="#0E2E28"/>
  </g>

  <!-- Microphone -->
  <g id="microphone">
    <!-- Mic Head (rounded rectangle shape) -->
    <rect x="196" y="120" width="80" height="140" rx="40" ry="40" fill="#CDFA8A"/>

    <!-- Mic Stand Curve -->
    <path d="M156 220 Q156 320 236 320" fill="none" stroke="#CDFA8A" stroke-width="12" stroke-linecap="round"/>

    <!-- Mic Vertical Stand -->
    <line x1="236" y1="320" x2="236" y2="380" stroke="#CDFA8A" stroke-width="12" stroke-linecap="round"/>

    <!-- Mic Base -->
    <line x1="196" y1="380" x2="276" y2="380" stroke="#CDFA8A" stroke-width="12" stroke-linecap="round"/>
  </g>

  <!-- Flowing Soundwaves -->
  <g id="soundwaves">
    <!-- Wave 1 (closest to mic) -->
    <path d="M300 160 Q330 200 300 256 Q270 312 300 360"
          fill="none"
          stroke="#CDFA8A"
          stroke-width="10"
          stroke-linecap="round"/>

    <!-- Wave 2 (middle) -->
    <path d="M340 140 Q380 200 340 256 Q300 312 340 380"
          fill="none"
          stroke="#CDFA8A"
          stroke-width="10"
          stroke-linecap="round"/>

    <!-- Wave 3 (furthest) -->
    <path d="M380 120 Q430 200 380 256 Q330 312 380 400"
          fill="none"
          stroke="#CDFA8A"
          stroke-width="10"
          stroke-linecap="round"/>
  </g>
</svg>