<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- VoiceType Logo: Soundwave morphing into text cursor -->

  <!-- Background circle -->
  <g id="background">
    <circle cx="256" cy="256" r="240" fill="#0E2E28"/>
  </g>

  <!-- Soundwave bars transitioning to cursor -->
  <g id="soundwave-to-cursor">
    <!-- Soundwave bars (left side - audio visualization) -->
    <rect x="64" y="216" width="28" height="80" rx="14" fill="#CDFA8A"/>
    <rect x="108" y="176" width="28" height="160" rx="14" fill="#CDFA8A"/>
    <rect x="152" y="136" width="28" height="240" rx="14" fill="#CDFA8A"/>
    <rect x="196" y="176" width="28" height="160" rx="14" fill="#CDFA8A"/>
    <rect x="240" y="116" width="28" height="280" rx="14" fill="#CDFA8A"/>

    <!-- Transition: Final bar morphing into cursor -->
    <g id="cursor">
      <!-- Cursor stem (taller, more prominent) -->
      <rect x="296" y="96" width="24" height="320" rx="6" fill="#CDFA8A"/>
      <!-- Cursor top serif -->
      <rect x="268" y="96" width="80" height="24" rx="6" fill="#CDFA8A"/>
      <!-- Cursor bottom serif -->
      <rect x="268" y="392" width="80" height="24" rx="6" fill="#CDFA8A"/>
    </g>

    <!-- Trailing wave elements (fading out, echo effect) -->
    <rect x="368" y="196" width="24" height="120" rx="12" fill="#CDFA8A"/>
    <rect x="408" y="226" width="24" height="60" rx="12" fill="#CDFA8A"/>
  </g>
</svg>
