<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- VoiceType Logo: Minimalist Waveform with Typing Indicator -->

  <!-- Background Circle -->
  <g id="background">
    <circle cx="256" cy="256" r="240" fill="#0E2E28"/>
  </g>

  <!-- Audio Waveform Bars -->
  <g id="waveform">
    <!-- Bar 1 - Short -->
    <rect x="96" y="206" width="32" height="100" rx="16" fill="#CDFA8A"/>

    <!-- Bar 2 - Medium -->
    <rect x="152" y="166" width="32" height="180" rx="16" fill="#CDFA8A"/>

    <!-- Bar 3 - Tall (Center) -->
    <rect x="208" y="126" width="32" height="260" rx="16" fill="#CDFA8A"/>

    <!-- Bar 4 - Medium -->
    <rect x="264" y="176" width="32" height="160" rx="16" fill="#CDFA8A"/>

    <!-- Bar 5 - Short -->
    <rect x="320" y="216" width="32" height="80" rx="16" fill="#CDFA8A"/>
  </g>

  <!-- Typing Cursor / Blinking Indicator -->
  <g id="cursor">
    <rect x="384" y="196" width="12" height="120" rx="6" fill="#CDFA8A">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
