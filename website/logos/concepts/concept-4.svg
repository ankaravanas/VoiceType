<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- VoiceType Logo: Voice bubble morphing into keyboard keys -->

  <!-- Background circle -->
  <g id="background">
    <circle cx="256" cy="256" r="240" fill="#0E2E28"/>
  </g>

  <!-- Speech bubble (upper portion) -->
  <g id="speech-bubble">
    <path d="M90 160
             C90 100, 140 60, 200 60
             L340 60
             C400 60, 420 100, 420 160
             L420 220
             C420 240, 400 250, 380 250
             L140 250
             C120 250, 90 240, 90 220
             Z"
          fill="#CDFA8A"/>
    <!-- Bubble tail -->
    <polygon points="100,230 80,290 160,250" fill="#CDFA8A"/>
  </g>

  <!-- Sound wave bars inside bubble -->
  <g id="sound-waves" fill="#0E2E28">
    <rect x="165" y="105" width="16" height="90" rx="8"/>
    <rect x="210" y="85" width="16" height="130" rx="8"/>
    <rect x="255" y="95" width="16" height="110" rx="8"/>
    <rect x="300" y="110" width="16" height="80" rx="8"/>
    <rect x="345" y="120" width="16" height="60" rx="8"/>
  </g>

  <!-- Dissolving particles (transition zone) -->
  <g id="transition-particles">
    <rect x="180" y="268" width="30" height="30" rx="6" fill="#CDFA8A"/>
    <rect x="230" y="262" width="26" height="26" rx="5" fill="#CDFA8A" opacity="0.85"/>
    <rect x="275" y="270" width="28" height="28" rx="5" fill="#CDFA8A" opacity="0.9"/>
    <rect x="320" y="265" width="24" height="24" rx="5" fill="#CDFA8A" opacity="0.75"/>
    <rect x="360" y="272" width="22" height="22" rx="4" fill="#CDFA8A" opacity="0.6"/>
    <rect x="140" y="275" width="22" height="22" rx="4" fill="#CDFA8A" opacity="0.7"/>
  </g>

  <!-- Keyboard keys (bottom portion) -->
  <g id="keyboard-keys">
    <!-- Row 1: 4 full keys -->
    <rect x="100" y="315" width="65" height="55" rx="10" fill="#CDFA8A"/>
    <rect x="178" y="315" width="65" height="55" rx="10" fill="#CDFA8A"/>
    <rect x="256" y="315" width="65" height="55" rx="10" fill="#CDFA8A"/>
    <rect x="334" y="315" width="65" height="55" rx="10" fill="#CDFA8A"/>

    <!-- Row 2: 3 keys (staggered like keyboard) -->
    <rect x="130" y="385" width="65" height="55" rx="10" fill="#CDFA8A"/>
    <rect x="208" y="385" width="95" height="55" rx="10" fill="#CDFA8A"/>
    <rect x="316" y="385" width="65" height="55" rx="10" fill="#CDFA8A"/>
  </g>

  <!-- Key indicators (subtle marks on keys) -->
  <g id="key-marks" fill="#0E2E28">
    <rect x="122" y="336" width="22" height="8" rx="4"/>
    <rect x="200" y="336" width="22" height="8" rx="4"/>
    <rect x="278" y="336" width="22" height="8" rx="4"/>
    <rect x="356" y="336" width="22" height="8" rx="4"/>
    <rect x="152" y="406" width="22" height="8" rx="4"/>
    <rect x="245" y="406" width="22" height="8" rx="4"/>
    <rect x="338" y="406" width="22" height="8" rx="4"/>
  </g>

</svg>