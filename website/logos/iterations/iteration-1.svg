<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- VoiceType Logo: Soundwave bars transitioning into text cursor -->
  <!-- Iteration 1: Balanced composition with prominent cursor focal point -->

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0E2E28"/>

  <!-- Soundwave bars (left side) - decreasing height toward center -->
  <g id="soundwave">
    <!-- Bar 1 - shortest, leftmost -->
    <rect x="80" y="216" width="28" height="80" rx="14" fill="#CDFA8A"/>
    <!-- Bar 2 - medium -->
    <rect x="120" y="186" width="28" height="140" rx="14" fill="#CDFA8A"/>
    <!-- Bar 3 - tall -->
    <rect x="160" y="156" width="28" height="200" rx="14" fill="#CDFA8A"/>
    <!-- Bar 4 - medium (transitioning) -->
    <rect x="200" y="176" width="28" height="160" rx="14" fill="#CDFA8A"/>
  </g>

  <!-- Text cursor (focal point - larger and centered) -->
  <g id="cursor">
    <!-- Cursor vertical stem - prominent and centered -->
    <rect x="250" y="106" width="28" height="300" rx="8" fill="#CDFA8A"/>
    <!-- Top serif - balanced width -->
    <rect x="218" y="106" width="92" height="24" rx="8" fill="#CDFA8A"/>
    <!-- Bottom serif - balanced width -->
    <rect x="218" y="382" width="92" height="24" rx="8" fill="#CDFA8A"/>
  </g>

  <!-- Trailing echo bars (right side) - fading out -->
  <g id="echo">
    <!-- Echo bar 1 - medium height -->
    <rect x="330" y="186" width="26" height="140" rx="13" fill="#CDFA8A"/>
    <!-- Echo bar 2 - shorter -->
    <rect x="370" y="206" width="24" height="100" rx="12" fill="#CDFA8A"/>
    <!-- Echo bar 3 - shortest, rightmost -->
    <rect x="408" y="226" width="22" height="60" rx="11" fill="#CDFA8A"/>
  </g>
</svg>
