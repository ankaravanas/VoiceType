<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark green circular background -->
  <circle cx="256" cy="256" r="256" fill="#0E2E28"/>

  <!-- Bold geometric soundwave bars transitioning to cursor -->
  <!-- All bars are perfect squares or near-square rectangles with sharp edges -->

  <!-- Bar 1 - Short square -->
  <rect x="98" y="224" width="32" height="64" fill="#CDFA8A"/>

  <!-- Bar 2 - Medium tall -->
  <rect x="146" y="192" width="32" height="128" fill="#CDFA8A"/>

  <!-- Bar 3 - Tallest bar -->
  <rect x="194" y="144" width="32" height="224" fill="#CDFA8A"/>

  <!-- Bar 4 - Medium -->
  <rect x="242" y="176" width="32" height="160" fill="#CDFA8A"/>

  <!-- Bar 5 - Getting shorter -->
  <rect x="290" y="208" width="32" height="96" fill="#CDFA8A"/>

  <!-- Bar 6 - Short transition bar -->
  <rect x="338" y="224" width="28" height="64" fill="#CDFA8A"/>

  <!-- Text Cursor - Bold vertical rectangle with distinctive proportions -->
  <rect x="382" y="128" width="32" height="256" fill="#CDFA8A"/>
</svg>
