<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- VoiceType Logo: Ultra-minimal soundwave to cursor -->

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0E2E28"/>

  <!-- Minimal soundwave bars (3 bars, bold strokes) -->
  <g id="soundwave">
    <!-- Bar 1: Short -->
    <rect x="100" y="196" width="40" height="120" rx="8" fill="#CDFA8A"/>
    <!-- Bar 2: Medium -->
    <rect x="160" y="156" width="40" height="200" rx="8" fill="#CDFA8A"/>
    <!-- Bar 3: Tall -->
    <rect x="220" y="116" width="40" height="280" rx="8" fill="#CDFA8A"/>
  </g>

  <!-- Text cursor with serifs -->
  <g id="cursor">
    <!-- Cursor stem -->
    <rect x="300" y="116" width="36" height="280" rx="4" fill="#CDFA8A"/>
    <!-- Top serif -->
    <rect x="280" y="116" width="76" height="20" rx="4" fill="#CDFA8A"/>
    <!-- Bottom serif -->
    <rect x="280" y="376" width="76" height="20" rx="4" fill="#CDFA8A"/>
  </g>
</svg>
